name: Health Check

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

on:
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Checkout gh-pages branch
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages-branch
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy existing data from gh-pages
        run: |
          mkdir -p data
          if [ -f gh-pages-branch/data/health-data.json ]; then
            cp gh-pages-branch/data/health-data.json data/
          fi
          if [ -f gh-pages-branch/data/health-summary.json ]; then
            cp gh-pages-branch/data/health-summary.json data/
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Run health check
        run: node scripts/health-check.js
        continue-on-error: true

      - name: Copy updated data to gh-pages
        run: |
          mkdir -p gh-pages-branch/data
          if [ -f data/health-data.json ]; then
            cp data/health-data.json gh-pages-branch/data/
          fi
          if [ -f data/health-summary.json ]; then
            cp data/health-summary.json gh-pages-branch/data/
          fi

      - name: Commit and push to gh-pages
        run: |
          cd gh-pages-branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update health check data - $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            git push
          fi
